<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCA HM - Billetera Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>BANCA HM</h1>
            <p>Bienvenido de nuevo</p>
        </header>

        <section class="balance-card">
            <span>Saldo disponible</span>
            <h2>$ 1.500.000</h2>
        </section>

        <section class="actions">
            <div class="action-btn">Enviar</div>
            <div class="action-btn">Pedir</div>
            <a href="https://www.davivienda.com" target="_blank" class="action-btn special">Recargar desde Davivienda</a>
        </section>

        <section class="history">
            <h3>Movimientos recientes</h3>
            <ul>
                <li><span>Cena Amigos</span> <span class="minus">-$ 45.000</span></li>
                <li><span>Transferencia Recibida</span> <span class="plus">+$ 200.000</span></li>
            </ul>
        </section>
    </div>
</body>
</html>
